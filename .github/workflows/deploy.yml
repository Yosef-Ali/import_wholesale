name: Deploy BuildSupply Pro

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'docker/docker-compose.yml'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o ConnectTimeout=10 ${VPS_USER}@${VPS_HOST} 'bash -s' <<'DEPLOY'
          set -e
          echo "==> Pulling latest code..."
          cd /opt/buildsupply
          git pull origin master

          echo "==> Building React UI image..."
          cd docker
          docker compose -p buildsupply build react-ui

          echo "==> Restarting React UI container..."
          docker compose -p buildsupply up -d --no-deps react-ui

          echo "==> Verifying deployment..."
          sleep 3
          if curl -sf http://localhost:3002 > /dev/null; then
            echo "✅ BuildSupply Pro is live on port 3002"
          else
            echo "❌ Health check failed!"
            docker compose -p buildsupply logs --tail=20 react-ui
            exit 1
          fi
          DEPLOY

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/config
