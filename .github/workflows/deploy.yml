name: Deploy BuildSupply Pro

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'docker/docker-compose.yml'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "==> Pulling latest code..."
            cd /opt/buildsupply
            git pull origin master

            echo "==> Building React UI image..."
            cd docker
            docker compose -p buildsupply build react-ui

            echo "==> Restarting React UI container..."
            docker compose -p buildsupply up -d --no-deps react-ui

            echo "==> Verifying deployment..."
            sleep 3
            if curl -sf http://localhost:3002 > /dev/null; then
              echo "✅ BuildSupply Pro is live on port 3002"
            else
              echo "❌ Health check failed!"
              docker compose -p buildsupply logs --tail=20 react-ui
              exit 1
            fi
