x-backend: &backend
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: buildsupply_app:latest
  environment:
    DB_HOST: db
    DB_PORT: "3306"
    REDIS_CACHE: redis-cache:6379
    REDIS_QUEUE: redis-queue:6379
    SOCKETIO_PORT: "9000"
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs
  depends_on:
    configurator:
      condition: service_completed_successfully

services:
  # ── Infrastructure ──────────────────────────────────────────────────
  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost --password=admin
      interval: 2s
      retries: 20

  redis-cache:
    image: redis:7-alpine

  redis-queue:
    image: redis:7-alpine

  # ── One-shot configurator ──────────────────────────────────────────
  configurator:
    <<: *backend
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps/buildsupply/buildsupply/modules.txt;
        bench set-config -g db_host         $$DB_HOST;
        bench set-config -g db_port         $$DB_PORT;
        bench set-config -g redis_cache     redis://$$REDIS_CACHE;
        bench set-config -g redis_queue     redis://$$REDIS_QUEUE;
        bench set-config -g redis_socketio  redis://$$REDIS_QUEUE;
        bench set-config -g socketio_port   $$SOCKETIO_PORT;
    depends_on:
      db:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # ── Create site (idempotent) ───────────────────────────────────────
  create-site:
    <<: *backend
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 60 db:3306;
        wait-for-it -t 60 redis-cache:6379;
        wait-for-it -t 60 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]]; do
          echo "Waiting for configurator...";
          sleep 5;
          if (( `date +%s`-start > 120 )); then echo "Timeout!"; exit 1; fi;
        done;
        echo "Config ready. Creating site...";
        grep -qx buildsupply sites/apps.txt 2>/dev/null || echo buildsupply >> sites/apps.txt;
        bench new-site --no-mariadb-socket --mariadb-root-password admin --install-app erpnext --install-app buildsupply --admin-password admin frontend 2>/dev/null || true;
        bench --site frontend install-app buildsupply 2>/dev/null || true;
        bench --site frontend migrate;

  # ── Application services ───────────────────────────────────────────
  backend:
    <<: *backend
    command: ["bench", "serve", "--port", "8000"]

  websocket:
    <<: *backend
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]

  queue-short:
    <<: *backend
    command: ["bench", "worker", "--queue", "short,default"]

  queue-long:
    <<: *backend
    command: ["bench", "worker", "--queue", "long"]

  scheduler:
    <<: *backend
    command: ["bench", "schedule"]

  # ── Nginx reverse proxy ────────────────────────────────────────────
  frontend:
    image: frappe/erpnext:v16.6.1
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: "50m"
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "8081:8080"
    depends_on:
      backend:
        condition: service_started
      websocket:
        condition: service_started

  # ── React SPA (BuildSupply Pro UI) ────────────────────────────────
  react-ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: buildsupply_react:latest
    ports:
      - "3002:80"
    depends_on:
      frontend:
        condition: service_started

volumes:
  db-data:
  sites:
  logs:
