server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 50m;

    # ERPNext site name — must match the site created by docker-compose
    # The inner ERPNext nginx resolves the Frappe site via Host header
    set $erpnext_host "frontend";

    # Proxy Frappe API requests to ERPNext backend
    location /api/ {
        proxy_pass         http://frontend:8080/api/;
        proxy_set_header   Host              $erpnext_host;
        proxy_set_header   X-Frappe-Site-Name $erpnext_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_read_timeout 120s;
        client_max_body_size 50m;
    }

    # Proxy uploaded files from ERPNext (^~ beats the regex static-asset block)
    location ^~ /files/ {
        proxy_pass         http://frontend:8080/files/;
        proxy_set_header   Host              $erpnext_host;
        proxy_set_header   X-Frappe-Site-Name $erpnext_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy private files from ERPNext
    location ^~ /private/files/ {
        proxy_pass         http://frontend:8080/private/files/;
        proxy_set_header   Host              $erpnext_host;
        proxy_set_header   X-Frappe-Site-Name $erpnext_host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # React SPA — all routes go to index.html (never cache index.html)
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
